  </defs>
  <text class="logo-dark logo-4c" x="0" y="82">4C</text>
  <rect class="logo-accent" x="250" y="6" width="2" height="94"/>
  <text class="logo-dark logo-name" x="268" y="54">CONSTRUCTION</text>
  <text class="logo-accent logo-tagline" x="268" y="96">CUSTOM HOMES &amp; RENOVATIONS</text>
